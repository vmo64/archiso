set default=1
set timeout=5

menuentry 'ArchPOWER Install (ppc64le)' {
        set gfxpayload=keep
        insmod normal 
        echo    'Loading Linux linux ...'
        linux   /arch/boot/ppc64le/vmlinuz-linux --- loglevel=3 archisobasedir=arch archisolabel=ARCH_202209
        echo    'Loading initial ramdisk ...'
        initrd  /arch/boot/ppc64le/initramfs-linux.img
}

menuentry 'ArchPOWER Install (serial hvc0 as console) (ppc64le)' {
